server:
  port: 9030
  servlet.context-path: /intelligence

spring:
  datasource:
    url: jdbc:postgresql://localhost:9010/lovable-intelligence-db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
    
  ai:
    model.chat: openai
    openai:
      # api-key: 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 #
      api-key: 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 #
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: google/gemini-3-flash-preview
          # model: nvidia/nemotron-3-ultra-550b-a55b:free
          # model: stepfun/step-3.7-flash
          temperature: 0.2
      embedding:
        options:
          model: qwen/qwen3-embedding-8b

---

spring:
  config:
    activate:
      on-profile: k8s
  datasource:
    url: jdbc:postgresql://pgvector.lovable-core.svc.cluster.local:5432/intelligence_db
    username: intelligence_user
    password: ${DB_PASSWORD}

ai:
   openai:
      api-key: ${AI_API_KEY}
    chat:
        options:
          model: google/gemini-3-flash-preview

